version: 2

project_name: mc

env:
  - CGO_ENABLED=0
  - GO111MODULE=on

before:
  hooks:
    - make clean
    - go generate ./...
    - go mod tidy
    - go mod download

builds:
  - id: mcli
    main: .
    binary: mcli
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goamd64:
      - v1
    flags:
      - -tags=kqueue
      - -trimpath
    ldflags:
      - "{{ .Env.LDFLAGS }}"

  - id: mc-docker
    main: .
    binary: mc
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    goamd64:
      - v1
    flags:
      - -tags=kqueue
      - -trimpath
    ldflags:
      - "{{ .Env.LDFLAGS }}"

archives:
  - id: mcli
    ids:
      - mcli
    name_template: "mcli_{{ .Env.PKG_VERSION }}_{{ .Os }}_{{ .Arch }}"

dockers:
  - id: mc-amd64
    ids:
      - mc-docker
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    use: buildx
    image_templates:
      - "pgsty/mc:{{ .Tag }}-amd64"
      - "pgsty/mc:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.version={{ .Tag }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    extra_files:
      - LICENSE
      - CREDITS

  - id: mc-arm64
    ids:
      - mc-docker
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    use: buildx
    image_templates:
      - "pgsty/mc:{{ .Tag }}-arm64"
      - "pgsty/mc:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.version={{ .Tag }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    extra_files:
      - LICENSE
      - CREDITS

docker_manifests:
  - name_template: "pgsty/mc:{{ .Tag }}"
    image_templates:
      - "pgsty/mc:{{ .Tag }}-amd64"
      - "pgsty/mc:{{ .Tag }}-arm64"
  - name_template: "pgsty/mc:latest"
    image_templates:
      - "pgsty/mc:latest-amd64"
      - "pgsty/mc:latest-arm64"

checksum:
  name_template: "mcli_{{ .Env.PKG_VERSION }}_checksums.txt"
  algorithm: sha256

release:
  github:
    owner: pgsty
    name: mc
  draft: false
  prerelease: false
  mode: replace
  replace_existing_artifacts: true
  name_template: "{{ .Tag }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "Merge pull request"
      - "Merge branch"

announce:
  skip: true
